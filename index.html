<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday 24 </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Microsoft YaHei', sans-serif; }
        #video-container {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 180px;
            height: 135px;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.15);
            z-index: 100;
            transform: scaleX(-1);
        }
        #input-video { width: 100%; height: 100%; object-fit: cover; display: block; }
        #ui-overlay {
            position: absolute;
            top: 30px;
            left: 30px;
            color: white;
            z-index: 100;
            pointer-events: none;
        }
        .status-tag {
            background: rgba(255, 64, 129, 0.15);
            padding: 8px 18px;
            border-radius: 30px;
            border: 1px solid rgba(255, 64, 129, 0.5);
            display: inline-block;
            margin-top: 15px;
            backdrop-filter: blur(8px);
            font-size: 0.9rem;
        }
        #loading-screen {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .loader {
            border: 2px solid #333;
            border-top: 2px solid #ff4081;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="loader"></div>
        <p class="mt-6 text-pink-500 text-sm tracking-widest">正在雕琢璀璨星尘蛋糕...</p>
        <button id="start-btn" class="mt-8 bg-pink-600 hover:bg-pink-500 text-white px-10 py-3 rounded-full hidden transition-all shadow-lg shadow-pink-500/20">开启生日仪式</button>
    </div>

    <div id="ui-overlay">
        <h1 class="text-4xl font-black italic text-transparent bg-clip-text bg-gradient-to-r from-pink-400 via-yellow-300 to-pink-400">Happy Birthday 24</h1>
        <div class="status-tag" id="gesture-status">等待识别手势...</div>
    </div>

    <div id="video-container">
        <video id="input-video" playsinline></video>
    </div>

    <canvas id="offscreen-canvas" style="display:none;" width="640" height="480"></canvas>

    <script id="vertexShader" type="x-shader/x-vertex">
        uniform float uTime;
        uniform float uExpand;
        attribute float aSize;
        attribute vec3 aColor;
        attribute vec3 aTarget;
        attribute float aPhase;
        attribute float aOpacityBase;
        varying vec3 vColor;
        varying float vOpacity;

        void main() {
            vColor = aColor;
            vOpacity = aOpacityBase * (0.6 + 0.4 * sin(uTime * 2.0 + aPhase));
            
            vec3 pos = position;
            pos.x += sin(uTime * 1.5 + aPhase) * 0.15;
            pos.y += cos(uTime * 1.2 + aPhase) * 0.15;
            pos.z += sin(uTime * 1.4 + aPhase) * 0.15;

            vec3 finalPos = mix(pos, aTarget, uExpand);

            vec4 mvPosition = modelViewMatrix * vec4(finalPos, 1.0);
            gl_PointSize = aSize * (180.0 / -mvPosition.z);
            gl_Position = projectionMatrix * mvPosition;
        }
    </script>

    <script id="fragmentShader" type="x-shader/x-fragment">
        varying vec3 vColor;
        varying float vOpacity;
        void main() {
            float dist = distance(gl_PointCoord, vec2(0.5));
            if (dist > 0.5) discard;
            float strength = pow(1.0 - dist * 2.0, 6.0);
            gl_FragColor = vec4(vColor, strength * vOpacity);
        }
    </script>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const starGroup = new THREE.Group();
        starGroup.position.y = -3.5; 
        scene.add(starGroup);

        const particleCount = 16000; 
        const geo = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const targets = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);
        const sizes = new Float32Array(particleCount);
        const phases = new Float32Array(particleCount);
        const opacities = new Float32Array(particleCount);

        const metaColors = [new THREE.Color(0xff4081), new THREE.Color(0xffd54f), new THREE.Color(0x80deea), new THREE.Color(0xffffff)];

        const layerRatios = [5.5, 4.0, 2.6]; 
        const layerHeights = [2.2, 2.0, 1.8]; 
        const layerYOffsets = [0, 2.2, 4.2]; 

        for(let i=0; i<particleCount; i++) {
            const angle = Math.random() * Math.PI * 2;
            const layer = i < 7000 ? 0 : (i < 12000 ? 1 : 2);
            
            const rBase = layerRatios[layer];
            const yBase = layerYOffsets[layer];
            const hBase = layerHeights[layer];

            const r = (0.7 + Math.random() * 0.3) * rBase;
            const x = Math.cos(angle) * r;
            const z = Math.sin(angle) * r;
            const y = yBase + Math.random() * hBase;

            positions[i*3] = x; positions[i*3+1] = y; positions[i*3+2] = z;

            const ringR = 15 + layer * 5;
            targets[i*3] = Math.cos(angle) * ringR + (Math.random()-0.5)*12;
            targets[i*3+1] = y + (Math.random()-0.5)*18;
            targets[i*3+2] = Math.sin(angle) * ringR + (Math.random()-0.5)*12;

            const colorBase = metaColors[Math.floor(Math.random() * metaColors.length)];
            colors[i*3] = colorBase.r; colors[i*3+1] = colorBase.g; colors[i*3+2] = colorBase.b;

            sizes[i] = Math.random() * 1.6 + 0.9;
            phases[i] = Math.random() * Math.PI * 2;
            opacities[i] = 0.3 + Math.random() * 0.7;
        }

        geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geo.setAttribute('aTarget', new THREE.BufferAttribute(targets, 3));
        geo.setAttribute('aColor', new THREE.BufferAttribute(colors, 3));
        geo.setAttribute('aSize', new THREE.BufferAttribute(sizes, 1));
        geo.setAttribute('aPhase', new THREE.BufferAttribute(phases, 1));
        geo.setAttribute('aOpacityBase', new THREE.BufferAttribute(opacities, 1));

        const shaderMat = new THREE.ShaderMaterial({
            uniforms: { uTime: { value: 0 }, uExpand: { value: 0 } },
            vertexShader: document.getElementById('vertexShader').textContent,
            fragmentShader: document.getElementById('fragmentShader').textContent,
            transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
        });

        const points = new THREE.Points(geo, shaderMat);
        starGroup.add(points);

        const fwGroup = new THREE.Group();
        scene.add(fwGroup);
        const fireworkParticles = [];

        function createFirework() {
            const count = 120;
            const g = new THREE.BufferGeometry();
            const pos = new Float32Array(count * 3);
            const vel = [];
            const color = new THREE.Color().setHSL(Math.random(), 0.8, 0.6);
            
            const origin = {
                x: (Math.random() - 0.5) * 18,
                y: 3 + Math.random() * 8,
                z: (Math.random() - 0.5) * 18
            };

            for (let i = 0; i < count; i++) {
                pos[i * 3] = origin.x;
                pos[i * 3 + 1] = origin.y;
                pos[i * 3 + 2] = origin.z;
                
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.random() * Math.PI;
                const speed = 0.1 + Math.random() * 0.25;
                vel.push({
                    x: Math.sin(phi) * Math.cos(theta) * speed,
                    y: Math.sin(phi) * Math.sin(theta) * speed,
                    z: Math.cos(phi) * speed
                });
            }
            g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            const m = new THREE.PointsMaterial({ color: color, size: 0.25, transparent: true, blending: THREE.AdditiveBlending });
            const p = new THREE.Points(g, m);
            p.userData = { vel, life: 1.0 };
            fwGroup.add(p);
            fireworkParticles.push(p);
        }

        const textCanvas = document.createElement('canvas');
        textCanvas.width = 512;
        textCanvas.height = 128;
        const tCtx = textCanvas.getContext('2d');
        tCtx.fillStyle = 'white';
        tCtx.font = 'bold 80px "Microsoft YaHei"';
        tCtx.textAlign = 'center';
        tCtx.textBaseline = 'middle';
        tCtx.shadowColor = '#ff4081';
        tCtx.shadowBlur = 20;
        tCtx.fillText('生 日 快 乐', 256, 64);

        const textTex = new THREE.CanvasTexture(textCanvas);
        const textMat = new THREE.MeshBasicMaterial({ map: textTex, transparent: true, opacity: 0 });
        const textPlane = new THREE.Mesh(new THREE.PlaneGeometry(14, 3.5), textMat); 
        textPlane.position.y = 4.5; 
        scene.add(textPlane);

        const candleGroup = new THREE.Group();
        const candleBody = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 1.8, 16), new THREE.MeshPhongMaterial({color: 0xffffff}));
        candleBody.position.y = 6.4; 
        candleGroup.add(candleBody);
        const flame = new THREE.Mesh(new THREE.SphereGeometry(0.18, 12, 12), new THREE.MeshBasicMaterial({color: 0xffaa00}));
        flame.scale.set(0.6, 2.0, 0.6);
        flame.position.y = 7.5;
        candleGroup.add(flame);
        starGroup.add(candleGroup); 

        const videoElement = document.getElementById('input-video');
        const gestureStatus = document.getElementById('gesture-status');
        const offscreenCanvas = document.getElementById('offscreen-canvas');
        const offscreenCtx = offscreenCanvas.getContext('2d');
        let currentGesture = "closed";
        let expandVal = 0;
        let lastFired = 0;

        const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                const dist = Math.sqrt(Math.pow(landmarks[8].x - landmarks[0].x, 2) + Math.pow(landmarks[8].y - landmarks[0].y, 2));
                currentGesture = dist > 0.4 ? "open" : "closed";
                gestureStatus.innerText = currentGesture === "open" ? "🖐️ 爆裂星辰！" : "✊ 凝结惊喜...";
            }
        });

        const cameraCtx = new Camera(videoElement, { 
            onFrame: async () => { 
                offscreenCtx.drawImage(videoElement, 0, 0, 640, 480);
                await hands.send({ image: offscreenCanvas }); 
            }, 
            width: 640, height: 480 
        });

        camera.position.set(0, 4, 22); 

        function update(timeMs) {
            const time = timeMs * 0.001;
            shaderMat.uniforms.uTime.value = time;
            
            const targetExpand = currentGesture === "open" ? 1.0 : 0.0;
            expandVal = THREE.MathUtils.lerp(expandVal, targetExpand, 0.08);
            shaderMat.uniforms.uExpand.value = expandVal;

            starGroup.rotation.y += 0.004;

            if (expandVal > 0.5) {
                textMat.opacity = THREE.MathUtils.lerp(textMat.opacity, 1.0, 0.05);
                textPlane.position.y = 4.8 + Math.sin(time * 2) * 0.3;
                candleGroup.visible = false;
                
                if (timeMs - lastFired > 300) {
                    createFirework();
                    lastFired = timeMs;
                }
            } else {
                textMat.opacity = THREE.MathUtils.lerp(textMat.opacity, 0.0, 0.1);
                candleGroup.visible = true;
            }

            for (let i = fireworkParticles.length - 1; i >= 0; i--) {
                const p = fireworkParticles[i];
                const posArr = p.geometry.attributes.position.array;
                const vels = p.userData.vel;
                p.userData.life -= 0.012;
                p.material.opacity = p.userData.life;
                
                for (let j = 0; j < vels.length; j++) {
                    posArr[j * 3] += vels[j].x;
                    posArr[j * 3 + 1] += vels[j].y;
                    posArr[j * 3 + 2] += vels[j].z;
                    vels[j].y -= 0.003; 
                }
                p.geometry.attributes.position.needsUpdate = true;
                
                if (p.userData.life <= 0) {
                    fwGroup.remove(p);
                    fireworkParticles.splice(i, 1);
                }
            }

            flame.scale.y = 1.4 + Math.sin(time * 18.0) * 0.4;
            renderer.render(scene, camera);
            requestAnimationFrame(update);
        }

        const startBtn = document.getElementById('start-btn');
        window.onload = () => { setTimeout(() => { document.querySelector('.loader').style.display = 'none'; startBtn.classList.remove('hidden'); }, 800); };
        startBtn.addEventListener('click', () => { 
            document.getElementById('loading-screen').style.display = 'none'; 
            cameraCtx.start(); 
            requestAnimationFrame(update); 
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
