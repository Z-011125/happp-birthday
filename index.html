<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyberpunk Particle Birthday Card</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Orbitron', sans-serif; color: #00f2ff; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .neon-text { text-shadow: 0 0 10px #00f2ff, 0 0 20px #00f2ff; }
        .cyber-btn { background: rgba(0, 20, 50, 0.7); border: 1px solid #00f2ff; transition: all 0.3s; pointer-events: auto; cursor: pointer; }
        .cyber-btn:hover { background: #00f2ff; color: #000; box-shadow: 0 0 20px #00f2ff; }
        #video-preview { position: fixed; bottom: 20px; left: 20px; width: 160px; height: 120px; border: 1px solid #00f2ff; border-radius: 8px; transform: scaleX(-1); opacity: 0.5; z-index: 5; display: none; }
        #loading-screen { z-index: 100; background: #000; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="canvas-container"></div>
    <video id="video-preview"></video>

    <!-- Initial Loading Screen -->
    <div id="loading-screen" class="fixed inset-0 flex flex-col items-center justify-center transition-opacity duration-1000">
        <h1 class="text-5xl font-bold neon-text mb-6">HAPPY BIRTHDAY</h1>
        <p class="text-blue-400 mb-10 text-center px-4">PREPARING PARTICLE MATRIX...</p>
        <button id="start-btn" class="cyber-btn px-10 py-4 rounded-full text-xl font-bold">INITIATE SYSTEM</button>
        <div id="auth-hint" class="mt-6 text-xs text-blue-600">需要开启摄像头以启用手势识别，麦克风以启用吹气交互</div>
    </div>

    <!-- UI Layer -->
    <div id="ui-layer" class="fixed inset-0 pointer-events-none">
        <div class="absolute top-6 right-6 flex flex-col gap-4 items-end">
            <div class="flex gap-2 pointer-events-auto">
                <button onclick="updateThemeColor('#00f2ff')" class="w-8 h-8 rounded-full border border-white" style="background: #00f2ff;"></button>
                <button onclick="updateThemeColor('#3366ff')" class="w-8 h-8 rounded-full border border-white" style="background: #3366ff;"></button>
                <button onclick="updateThemeColor('#00ffcc')" class="w-8 h-8 rounded-full border border-white" style="background: #00ffcc;"></button>
            </div>
            <button id="reset-ui-btn" onclick="resetSystem()" class="cyber-btn px-3 py-1 text-xs rounded pointer-events-auto hidden">RESET SYSTEM</button>
        </div>

        <div id="gesture-indicator" class="hidden absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-2xl neon-text text-center">
            <p>检测到双手！</p>
            <p id="countdown-val" class="text-8xl font-bold mt-4">3</p>
        </div>

        <div id="instruction" class="absolute bottom-12 w-full text-center text-blue-400 text-sm tracking-widest uppercase px-4">
            等待系统初始化...
        </div>

        <!-- Birthday Message Modal -->
        <div id="letter-modal" class="hidden fixed inset-0 flex items-center justify-center bg-black/90 p-6 z-50 pointer-events-auto">
            <div class="cyber-btn max-w-lg w-full p-8 rounded border-blue-400 relative">
                <button id="close-letter" class="absolute top-2 right-4 text-3xl">&times;</button>
                <h2 class="text-xl mb-4 border-b border-blue-500 pb-2">MESSAGE DECRYPTED:</h2>
                <div id="typing-content" class="text-blue-200 leading-relaxed min-h-[120px] whitespace-pre-wrap text-sm mb-6"></div>
                <div class="flex justify-center">
                    <button onclick="resetSystem()" class="cyber-btn px-6 py-2 rounded text-sm">RE-RUN PROTOCOL (重新开始)</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- Core Variables ---
        let scene, camera, renderer, starParticles, cakeParticles;
        let clock = new THREE.Clock();
        let state = 'waiting'; // waiting, ready, counting, assembling, active, extinguished
        let themeColor = new THREE.Color(0x00f2ff);
        let hands, cameraPipe;
        let audioCtx, analyser, dataArray;
        
        const PARTICLE_COUNT = 8000;
        let targetPositions = [];

        // --- Init Scene ---
        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 6;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            createStarfield();
            initParticleSystem();
            animate();
        }

        function createStarfield() {
            const geo = new THREE.BufferGeometry();
            const pos = [];
            for (let i = 0; i < 2000; i++) {
                pos.push((Math.random() - 0.5) * 40, (Math.random() - 0.5) * 40, (Math.random() - 0.5) * 40);
            }
            geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
            const mat = new THREE.PointsMaterial({ color: 0x003366, size: 0.05, transparent: true, opacity: 0.5 });
            starParticles = new THREE.Points(geo, mat);
            scene.add(starParticles);
        }

        function initParticleSystem() {
            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(PARTICLE_COUNT * 3);
            
            // Random scatter
            for (let i = 0; i < PARTICLE_COUNT * 3; i++) {
                pos[i] = (Math.random() - 0.5) * 20;
            }
            
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            const mat = new THREE.PointsMaterial({
                color: themeColor,
                size: 0.03,
                transparent: true,
                opacity: 0.8,
                blending: THREE.AdditiveBlending
            });

            cakeParticles = new THREE.Points(geo, mat);
            scene.add(cakeParticles);
            generateCakeShape();
        }

        function generateCakeShape() {
            const points = [];
            const baseGeo = new THREE.CylinderGeometry(1.5, 1.5, 1.2, 32, 20);
            points.push(...sampleGeometry(baseGeo, 4000, 0));
            const topGeo = new THREE.CylinderGeometry(1, 1, 0.8, 32, 15);
            points.push(...sampleGeometry(topGeo, 3000, 1.0));
            const candleGeo = new THREE.CylinderGeometry(0.08, 0.08, 0.6, 8, 5);
            points.push(...sampleGeometry(candleGeo, 1000, 1.7));

            targetPositions = new Float32Array(PARTICLE_COUNT * 3);
            for(let i=0; i<PARTICLE_COUNT; i++) {
                const p = points[i % points.length];
                targetPositions[i*3] = p.x;
                targetPositions[i*3+1] = p.y;
                targetPositions[i*3+2] = p.z;
            }
        }

        function sampleGeometry(geo, count, offsetVal) {
            const pts = [];
            const posAttr = geo.attributes.position;
            for(let i=0; i<count; i++) {
                const index = Math.floor(Math.random() * posAttr.count);
                pts.push({
                    x: posAttr.getX(index),
                    y: posAttr.getY(index) + offsetVal,
                    z: posAttr.getZ(index)
                });
            }
            return pts;
        }

        // --- System Reset ---
        function resetSystem() {
            TWEEN.removeAll();
            state = 'ready';
            
            // Hide Modals
            document.getElementById('letter-modal').classList.add('hidden');
            document.getElementById('gesture-indicator').classList.add('hidden');
            document.getElementById('instruction').innerText = "系统已重置：请再次对着摄像头举起双手...";
            document.getElementById('reset-ui-btn').classList.add('hidden');

            // Reset Rotation
            cakeParticles.rotation.set(0, 0, 0);

            // Scatter particles back to random space
            const posAttr = cakeParticles.geometry.attributes.position;
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                new TWEEN.Tween(posAttr.array)
                    .to({
                        [i * 3]: (Math.random() - 0.5) * 20,
                        [i * 3 + 1]: (Math.random() - 0.5) * 20,
                        [i * 3 + 2]: (Math.random() - 0.5) * 20
                    }, 1500)
                    .easing(TWEEN.Easing.Circular.Out)
                    .onUpdate(() => posAttr.needsUpdate = true)
                    .start();
            }
        }

        // --- MediaPipe Gesture ---
        async function setupMediaPipe() {
            const videoElement = document.getElementById('video-preview');
            hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
            hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
            hands.onResults(onHandResults);

            cameraPipe = new Camera(videoElement, {
                onFrame: async () => { await hands.send({image: videoElement}); },
                width: 640, height: 480
            });
            cameraPipe.start();
            document.getElementById('video-preview').style.display = 'block';
        }

        function onHandResults(results) {
            if (state === 'ready' && results.multiHandLandmarks.length === 2) {
                startCountdown();
            }
            if (state === 'active' && results.multiHandLandmarks.length > 0) {
                const hand = results.multiHandLandmarks[0][9];
                cakeParticles.rotation.y = (hand.x - 0.5) * 2;
                cakeParticles.rotation.x = (hand.y - 0.5) * 2;
            }
        }

        // --- Logic Flow ---
        function startCountdown() {
            state = 'counting';
            const indicator = document.getElementById('gesture-indicator');
            const countVal = document.getElementById('countdown-val');
            indicator.classList.remove('hidden');
            
            let time = 3;
            countVal.innerText = time;
            const timer = setInterval(() => {
                time--;
                countVal.innerText = time;
                if (time <= 0 || state !== 'counting') {
                    clearInterval(timer);
                    if (state === 'counting') {
                        indicator.classList.add('hidden');
                        morphToCake();
                    }
                }
            }, 1000);
        }

        function morphToCake() {
            state = 'assembling';
            document.getElementById('instruction').innerText = "SYSTEM: ASSEMBLING MOLECULAR STRUCTURE...";
            document.getElementById('reset-ui-btn').classList.remove('hidden');
            
            const posAttr = cakeParticles.geometry.attributes.position;
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                new TWEEN.Tween(posAttr.array)
                    .to({
                        [i * 3]: targetPositions[i * 3],
                        [i * 3 + 1]: targetPositions[i * 3 + 1],
                        [i * 3 + 2]: targetPositions[i * 3 + 2]
                    }, 2000 + Math.random() * 1000)
                    .easing(TWEEN.Easing.Exponential.InOut)
                    .onUpdate(() => posAttr.needsUpdate = true)
                    .start();
            }

            setTimeout(() => {
                if (state === 'assembling') {
                    state = 'active';
                    document.getElementById('instruction').innerText = "DETECTED: CANDLE LIT. PLEASE BLOW INTO MICROPHONE.";
                    if(!audioCtx) initMic();
                }
            }, 3500);
        }

        async function initMic() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioCtx = new AudioContext();
                const source = audioCtx.createMediaStreamSource(stream);
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 256;
                source.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);
            } catch (e) { console.log("Mic access denied"); }
        }

        function checkBlow() {
            if (!analyser || state !== 'active') return;
            analyser.getByteFrequencyData(dataArray);
            let sum = dataArray.reduce((a, b) => a + b, 0);
            if (sum / dataArray.length > 70) extinguish();
        }

        function extinguish() {
            state = 'extinguished';
            document.getElementById('instruction').innerText = "HAPPY BIRTHDAY! ENCRYPTED MESSAGE RECEIVED.";
            
            const posAttr = cakeParticles.geometry.attributes.position;
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                new TWEEN.Tween(posAttr.array)
                    .to({
                        [i * 3]: posAttr.array[i * 3] * 5,
                        [i * 3 + 1]: posAttr.array[i * 3 + 1] * 5,
                        [i * 3 + 2]: posAttr.array[i * 3 + 2] * 5
                    }, 2000)
                    .easing(TWEEN.Easing.Quadratic.Out)
                    .onUpdate(() => posAttr.needsUpdate = true)
                    .start();
            }

            setTimeout(showLetter, 1500);
        }

        function showLetter() {
            if (state !== 'extinguished') return;
            const modal = document.getElementById('letter-modal');
            const content = document.getElementById('typing-content');
            modal.classList.remove('hidden');
            const text = ">> DECRYPTION COMPLETE...\n\n检测到新的岁次代码已成功编译。\n愿你的生命矩阵中：\n- 逻辑零错误 (0 Errors)\n- 情感高带宽 (High Bandwidth)\n- 快乐无限循环 (Infinite Loop of Joy)\n\n祝你生日快乐，赛博世界的旅者！";
            let i = 0;
            content.innerText = "";
            const typer = setInterval(() => {
                if (state !== 'extinguished') { clearInterval(typer); return; }
                content.innerText += text[i];
                i++;
                if (i >= text.length) clearInterval(typer);
            }, 50);
        }

        function updateThemeColor(hex) {
            themeColor.set(hex);
            if (cakeParticles) cakeParticles.material.color.set(hex);
        }

        function animate() {
            requestAnimationFrame(animate);
            TWEEN.update();
            const time = clock.getElapsedTime();
            
            if (starParticles) starParticles.rotation.z += 0.001;
            if (cakeParticles && state === 'active') {
                cakeParticles.rotation.y += 0.005;
                const posAttr = cakeParticles.geometry.attributes.position;
                for(let i=0; i<PARTICLE_COUNT; i++) {
                    posAttr.array[i*3+1] += Math.sin(time + i) * 0.001;
                }
                posAttr.needsUpdate = true;
            }

            checkBlow();
            renderer.render(scene, camera);
        }

        document.getElementById('start-btn').addEventListener('click', async () => {
            document.getElementById('loading-screen').classList.add('opacity-0');
            setTimeout(() => {
                document.getElementById('loading-screen').classList.add('hidden');
                state = 'ready';
                document.getElementById('instruction').innerText = "请对着摄像头举起双手以启动程序...";
            }, 1000);
            
            setupMediaPipe();
        });

        document.getElementById('close-letter').onclick = () => document.getElementById('letter-modal').classList.add('hidden');

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
